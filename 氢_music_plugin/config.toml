# music_plugin - 自动生成的配置文件
# 轻量化的点歌插件，支持多音源、卡片播放、语音播放、热评、歌词、无需VIP

[general]

# 默认点歌平台
default_player_name = "网易点歌"

# 搜索歌曲数量限制(1-20)
song_limit = 5

# 选择模式：text(文本模式)或single(单曲模式)
select_mode = "text(文本模式)"

# 点歌超时时间（秒）
timeout = 30

[send]

# 发送模式优先级列表
send_modes = [
    "card(卡片模式)",
    "record(语音模式)",
    "file(文件模式)",
    "text(文本模式)",
]

# 是否启用热评
enable_comments = true

# 是否启用歌词图片
enable_lyrics = false

# 超时后是否撤回选歌消息
timeout_recall = true

[network]

# 代理地址，如 http://127.0.0.1:7890，留空则不使用代理
proxy = ""

# 网易云NodeJS服务地址
nodejs_base_url = "https://163api.qijieya.cn"

[cache]

# 重载插件时是否清空歌曲缓存
clear_cache = true

